*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body { height: 100%; background: #0a0e14; color: #e2e8f0; font-family: 'Rajdhani', system-ui, sans-serif; overflow: hidden; }

#app { max-width: 500px; margin: 0 auto; height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

.top-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #1e2a38; flex-shrink: 0; background: #0a0e14; }
.top-bar-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; flex: 1; color: #e2e8f0; }
.back-btn { background: none; border: none; color: #22d3ee; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; font-family: inherit; width: 24px; text-align: center; flex-shrink: 0; }
.dash-btn { font-size: 11px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: #22d3ee; text-decoration: none; background: #111820; border: 1px solid #1e2a38; border-radius: 6px; padding: 5px 9px; white-space: nowrap; flex-shrink: 0; }

.bottom-nav { display: flex; border-top: 1px solid #1e2a38; background: #111820; flex-shrink: 0; }
.nav-btn { flex: 1; background: none; border: none; padding: 10px 0 14px; font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; color: #7a9abf; }
.nav-btn.active { color: #22d3ee; }

.screen-content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.card { background: #111820; border: 1px solid #1e2a38; border-radius: 8px; padding: 14px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-block { background: #0d1520; border-radius: 6px; padding: 8px 10px; min-width: 0; }
.stat-lbl { font-size: 8px; color: #7a9abf; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-val { font-size: 16px; font-weight: 600; color: #e2e8f0; margin-top: 3px; line-height: 1.1; display: flex; align-items: baseline; gap: 3px; flex-wrap: wrap; }
.stat-val.big { font-size: 22px; }
.stat-unit { font-size: 10px; color: #7a9abf; font-weight: 500; }

.btn { border: none; border-radius: 8px; padding: 13px 16px; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; font-family: inherit; width: 100%; display: block; }
.btn-primary   { background: #22d3ee; color: #0a0e14; }
.btn-secondary { background: transparent; color: #22d3ee; border: 1px solid #22d3ee; }
.btn-ghost     { background: #111820; color: #e2e8f0; border: 1px solid #1e2a38; }
.btn-danger    { background: transparent; color: #f87171; border: 1px solid #f87171; }
.btn:disabled  { opacity: 0.4; cursor: not-allowed; }

.field-lbl  { font-size: 9px; color: #7a9abf; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.field-wrap { background: #0d1520; border-radius: 6px; border: 1px solid #1e2a38; padding: 10px 12px; display: flex; align-items: center; gap: 6px; }
.field-input { background: none; border: none; color: #e2e8f0; font-size: 16px; font-family: inherit; font-weight: 600; width: 100%; outline: none; }
.field-unit  { font-size: 11px; color: #7a9abf; flex-shrink: 0; }

.tab-picker { display: flex; background: #0d1520; border-radius: 8px; padding: 3px; border: 1px solid #1e2a38; }
.tab-btn { flex: 1; border: none; border-radius: 6px; padding: 8px 0; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-family: inherit; cursor: pointer; background: transparent; color: #7a9abf; }
.tab-btn.active { background: #22d3ee; color: #0a0e14; }

.quick-picks { display: flex; gap: 8px; flex-wrap: wrap; }

.toggle { width: 38px; height: 22px; border-radius: 11px; border: none; position: relative; cursor: pointer; flex-shrink: 0; }

</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div id="app"></div>
<div id="alarm-overlay">
  <div class="alarm-ring">!</div>
  <div class="alarm-title" id="alarm-title">ANCHOR DRAGGING</div>
  <div class="alarm-detail" id="alarm-detail"></div>
  <button class="btn btn-primary" style="width:100%;max-width:280px;margin-top:8px" data-action="ack-alarm">Acknowledge</button>
</div>
<div id="proxy-err" style="display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#7f1d1d;color:#fca5a5;font-size:12px;font-weight:600;font-family:inherit;padding:8px 16px;border-radius:8px;border:1px solid #f87171;z-index:9999;max-width:calc(100vw - 32px);text-align:center;"></div>
<script>
// ─── Config ──────────────────────────────────────────────────────────────
const CFG = (typeof DASHBOARD_CONFIG !== 'undefined') ? DASHBOARD_CONFIG : {};
const SK_HOST = (CFG.signalk && CFG.signalk.host) || window.location.hostname || '192.168.1.238';
const SK_PORT = (CFG.signalk && CFG.signalk.port) || 3000;
const POLL_URL = 'http://' + SK_HOST + ':' + SK_PORT + '/signalk/v1/api/vessels/self';

// ─── State ────────────────────────────────────────────────────────────────
const DEFAULT_EVENTS = {
  dragging:     { enabled: true,  priority: 2,  title: "⚠️ Anchor Dragging!", message: "S/V Oroboro is dragging anchor. Check position immediately." },
  gpsLost:      { enabled: true,  priority: 2,  title: "⚠️ Anchor Alarm: GPS Lost", message: "No GPS position updates received." },
  anchorSet:    { enabled: true,  priority: 0,  title: "Anchor Set", message: "Anchor alarm armed on S/V Oroboro." },
  anchorRaised: { enabled: true,  priority: 0,  title: "Anchor Raised", message: "Anchor alarm disarmed on S/V Oroboro." },
  okCheckin:    { enabled: false, priority: -1, title: "Anchor OK", message: "Anchor holding, all normal." },
};

const anchorCfg = (CFG.anchor) || {};
const pvCfg = (anchorCfg.pushover) || {};

const S = {
  screen: 'configure',
  cfgTab: 'normal',
  pvExpanded: 'dragging',

  anchorSet: false,
  anchorLat: null, anchorLon: null,
  radius: anchorCfg.defaultRadius || 30,
  arc: null,

  pushover: {
    userKey: pvCfg.userKey || '',
    apiToken: pvCfg.apiToken || '',
    events: JSON.parse(JSON.stringify(pvCfg.events || DEFAULT_EVENTS)),
  },

  curLat: null, curLon: null, gpsAccuracy: null, lastGpsFix: null,
  distance: null, bearing: null,

  trail: [], maxDist: 0, avgDistSum: 0, avgDistCount: 0, watchStart: null,

  skInitialized: false,   // true once first SK anchor fetch completes; drives banner state
  draggingAlert: false, alarmAcknowledged: false,
  lastAlarmState: 'ok',    // 'ok' | 'dragging' | 'gps-lost' — tracks previous poll's alarm state
  alarmSuppressed: false,  // true from Set Anchor tap until first confirmed SK poll on armed screen
  lastPushover: {},

  fRadius: anchorCfg.defaultRadius || 30,
  fArcSmall: '40', fArcBig: '55', fArcStart: '345', fArcEnd: '20',
  fAnchorDist: 18, fAnchorBearing: 305,
  activeMode: 'normal',
  fPvShowToken: false,
};

// ─── Math ─────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
  const dp = (lat2 - lat1) * Math.PI / 180;
  const dl = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function destinationPoint(lat, lon, distM, bearingDeg) {
  const R = 6371000;
  const d = distM / R;
  const b = bearingDeg * Math.PI / 180;
  const p1 = lat * Math.PI / 180, l1 = lon * Math.PI / 180;
  const p2 = Math.asin(Math.sin(p1)*Math.cos(d) + Math.cos(p1)*Math.sin(d)*Math.cos(b));
  const l2 = l1 + Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(p1), Math.cos(d) - Math.sin(p1)*Math.sin(p2));
  return { lat: p2 * 180 / Math.PI, lon: ((l2 * 180 / Math.PI) + 540) % 360 - 180 };
}

function bearingTo(lat1, lon1, lat2, lon2) {
  const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
  const dl = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dl) * Math.cos(p2);
  const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function bearingInArc(b, start, end) {
  let span = end - start;
  if (span < 0) span += 360;
  if (span === 0) return true;
  return ((b - start + 360) % 360) <= span;
}

function isOutsideBound() {
  if (!S.anchorSet || S.distance === null) return false;
  if (S.arc) {
    // In bounds ONLY if BOTH: bearing inside wedge AND distance between small and big.
    const inBearing  = bearingInArc(S.bearing, S.arc.startAngle, S.arc.endAngle);
    const inDistance = S.distance >= S.arc.small && S.distance <= S.arc.big;
    return !(inBearing && inDistance);
  }
  return S.distance > S.radius;
}

// ─── Signal K anchor sync ─────────────────────────────────────────────────
// Reads and writes navigation.anchor.position via the SK REST API so that
// every device sees the same armed/unarmed state, not just the tab that
// completed the Set Anchor flow.
const SK_ANCHOR_URL = POLL_URL + '/navigation/anchor';
const SK_ANCHOR_PUT_URL = POLL_URL + '/navigation/anchor/position';
const PROXY_URL = 'http://' + SK_HOST + ':3001';

async function fetchAnchorState() {
  try {
    const r = await fetch(SK_ANCHOR_URL);
    if (!r.ok) {
      // 404 means the anchor path doesn't exist in SK (not set or plugin absent)
      _applySkAnchorState(null);
      return;
    }
    const data = await r.json();
    const pos = data && data.position && data.position.value;
    _applySkAnchorState((pos && pos.latitude != null && pos.longitude != null) ? pos : null);
  } catch(e) {
    // Network error — don't change S.anchorSet, but unblock the 'checking' banner
    if (!S.skInitialized) { S.skInitialized = true; if (S.screen === 'main') render(); }
  }
}

function _applySkAnchorState(pos) {
  const wasSet = S.anchorSet;
  if (pos) {
    if (!wasSet) {
      // Anchor just became set (this device armed it, or another device did)
      S.watchStart = S.watchStart || Date.now();
      S.trail = []; S.maxDist = 0; S.avgDistSum = 0; S.avgDistCount = 0;
    }
    S.anchorSet = true;
    S.anchorLat = pos.latitude;
    S.anchorLon = pos.longitude;
  } else {
    if (wasSet) {
      // Anchor was raised (possibly on another device) — reset all watch state
      S.anchorSet = false; S.anchorLat = null; S.anchorLon = null;
      S.arc = null; S.distance = null; S.bearing = null;
      S.draggingAlert = false; S.alarmAcknowledged = false;
      S.trail = []; S.maxDist = 0; S.avgDistSum = 0; S.avgDistCount = 0; S.watchStart = null;
      hideAlarm();
    } else if (S.screen !== 'set-anchor' && S.screen !== 'set-distance') {
      // Not set and not mid-flow — clear any stale staged position
      S.anchorLat = null; S.anchorLon = null;
    }
    S.anchorSet = false;
  }
  const firstFetch = !S.skInitialized;
  S.skInitialized = true;
  // Re-render main screen when state is first known, or when set/unset flips
  if ((firstFetch || wasSet !== S.anchorSet) && S.screen === 'main') render();
}

function showProxyError(msg) {
  const el = document.getElementById('proxy-err');
  if (!el) return;
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function putAnchorPosition(lat, lon) {
  try {
    const endpoint = lat !== null ? '/api/anchor/set' : '/api/anchor/raise';
    const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
    if (lat !== null) opts.body = JSON.stringify({ latitude: lat, longitude: lon });
    const r = await fetch(PROXY_URL + endpoint, opts);
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data.ok === false) showProxyError(data.error || 'Anchor write failed (HTTP ' + r.status + ')');
  } catch (e) {
    showProxyError('Anchor proxy unreachable — check anchor-api service on Pi');
  }
}

// ─── Pushover ─────────────────────────────────────────────────────────────
function sendPushover(eventKey) {
  // Alarm events require confirmed armed state and must not fire during the
  // suppression window (between proxy writes and first SK position confirmation).
  if ((eventKey === 'dragging' || eventKey === 'gpsLost') && (!S.anchorSet || S.alarmSuppressed)) return;
  const cfg = S.pushover;
  if (!cfg.userKey || !cfg.apiToken) return;
  const ev = cfg.events[eventKey];
  if (!ev || !ev.enabled) return;
  const now = Date.now();
  // 60-second per-event cooldown — prevents spam even if draggingAlert resets (e.g. brief SK hiccup)
  if (S.lastPushover[eventKey] && now - S.lastPushover[eventKey] < 60000) return;
  S.lastPushover[eventKey] = now;
  const params = new URLSearchParams({ token: cfg.apiToken, user: cfg.userKey, title: ev.title, message: ev.message, priority: String(ev.priority) });
  if (ev.priority === 2) { params.set('retry', '60'); params.set('expire', '3600'); }
  fetch('https://api.pushover.net/1/messages.json', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }).catch(() => {});
}

function sendPushoverTest() {
  const cfg = S.pushover;
  if (!cfg.userKey || !cfg.apiToken) return;
  const params = new URLSearchParams({ token: cfg.apiToken, user: cfg.userKey, title: 'Anchor Watch Test', message: 'Test notification from S/V Oroboro Anchor Watch.', priority: '0' });
  fetch('https://api.pushover.net/1/messages.json', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }).catch(() => {});
}

// ─── Map globals ──────────────────────────────────────────────────────────
let _cfgMap = null, _cfgZone = null, _cfgAnchorMark = null;
let _armedMap = null, _armedZone = null, _armedBoatMark = null,
    _armedAnchorMark = null, _armedTrail = null, _armedAis = [];
let _aisPollCount = 0;

// ─── Poll ─────────────────────────────────────────────────────────────────
let _gpsLostNotified = false;

async function poll() {
  await fetchAnchorState(); // re-sync armed/unarmed from SK on every poll cycle
  // Clear suppression window once SK has confirmed anchor — also reset lastAlarmState
  // so the first genuine outside-bounds reading after arming fires a notification.
  if (S.alarmSuppressed && S.anchorSet) { S.alarmSuppressed = false; S.lastAlarmState = 'ok'; }
  try {
    const r = await fetch(POLL_URL);
    if (!r.ok) return;
    const data = await r.json();
    const nav = data.navigation;
    if (nav && nav.position && nav.position.value) {
      const pos = nav.position.value;
      if (pos.latitude !== undefined && pos.longitude !== undefined) {
        S.curLat = pos.latitude;
        S.curLon = pos.longitude;
        S.lastGpsFix = Date.now();
        _gpsLostNotified = false;
      }
    }
    if (S.anchorSet && S.curLat !== null && S.anchorLat !== null) {
      S.distance = haversine(S.anchorLat, S.anchorLon, S.curLat, S.curLon);
      S.bearing = bearingTo(S.anchorLat, S.anchorLon, S.curLat, S.curLon);
      const now = Date.now();
      const last = S.trail[S.trail.length - 1];
      if (!last || now - last.t > 10000) {
        S.trail.push({ lat: S.curLat, lon: S.curLon, t: now });
        if (S.trail.length > 500) S.trail.shift();
      }
      if (S.distance > S.maxDist) S.maxDist = S.distance;
      S.avgDistSum += S.distance;
      S.avgDistCount++;
    }
    _aisPollCount++;
    if (_aisPollCount % 30 === 0) updateAISOnMap();
    checkAlarms();
    updateLive();
  } catch(e) { /* network error, ignore */ }
}

function checkAlarms() {
  // INVARIANT: dragging alert can only trigger when S.anchorSet === true.
  // S.anchorSet is set exclusively by _applySkAnchorState(), so the alarm
  // overlay and "NO ANCHOR SET" state are mutually exclusive by construction.
  if (!S.anchorSet) return;
  if (S.lastGpsFix && Date.now() - S.lastGpsFix > 30000) {
    if (!_gpsLostNotified) {
      _gpsLostNotified = true;
      sendPushover('gpsLost');
      showAlarm('gps');
    }
    S.lastAlarmState = 'gps-lost';
    return;
  }
  if (isOutsideBound()) {
    // Fire Pushover only on genuine ok→dragging transition, not on sustained dragging.
    // sendPushover() also enforces a 60-second per-event cooldown.
    if (S.lastAlarmState !== 'dragging' && !S.alarmSuppressed) {
      S.draggingAlert = true;
      sendPushover('dragging');
    }
    S.lastAlarmState = 'dragging';
    if (!S.alarmAcknowledged) showAlarm('dragging');
  } else {
    if (S.draggingAlert && S.alarmAcknowledged) {
      S.draggingAlert = false;
      S.alarmAcknowledged = false;
    }
    S.lastAlarmState = 'ok';
  }
}

// ─── Alarm overlay ────────────────────────────────────────────────────────
function showAlarm(type) {
  let title, detail;
  if (type === 'dragging') {
    title = 'ANCHOR DRAGGING';
    const dist = S.distance !== null ? Math.round(S.distance) : '?';
    const limit = S.arc ? S.arc.big : S.radius;
    const over = S.distance !== null ? Math.max(0, Math.round(S.distance - limit)) : 0;
    detail = 'Vessel is ' + dist + 'm from anchor — ' + over + 'm past the ' + limit + 'm allowed radius. Pushover alert sent.';
  } else {
    title = 'GPS SIGNAL LOST';
    detail = 'No GPS position updates received for 30 seconds. Check Signal K connection.';
  }
  const el = document.getElementById('alarm-overlay');
  const titleEl = document.getElementById('alarm-title');
  const detailEl = document.getElementById('alarm-detail');
  if (titleEl) titleEl.textContent = title;
  if (detailEl) detailEl.textContent = detail;
  if (el) el.classList.add('active');
}

function hideAlarm() {
  const el = document.getElementById('alarm-overlay');
  if (el) el.classList.remove('active');
  S.alarmAcknowledged = true;
}

// ─── Live DOM updates (no full re-render) ─────────────────────────────────
function updateLive() {
  if (S.screen === 'main') {
    const distEl = document.getElementById('live-dist');
    if (distEl && S.anchorSet) {
      const d = S.distance !== null ? Math.round(S.distance) : '—';
      distEl.textContent = d;
      const limit = S.arc ? S.arc.big : S.radius;
      if (S.distance !== null) distEl.style.color = S.distance > limit * 0.8 ? '#f59e0b' : '#22d3ee';
    }
    if (_armedMap) {
      // Sync anchor marker if SK updated the stored position
      if (_armedAnchorMark && S.anchorLat !== null) {
        _armedAnchorMark.setLatLng([S.anchorLat, S.anchorLon]);
      } else if (!_armedAnchorMark && S.anchorLat !== null) {
        _armedAnchorMark = L.circleMarker([S.anchorLat, S.anchorLon], {
          radius: 8, color: '#fff', weight: 2, fillColor: '#f59e0b', fillOpacity: 1
        }).addTo(_armedMap);
      }
      // Recreate zone if it was lost (e.g. after a re-render destroyed and rebuilt the map)
      if (!_armedZone && S.anchorLat !== null) updateArmedMapZone();
      if (S.curLat !== null) {
        const pos = [S.curLat, S.curLon];
        if (_armedBoatMark) {
          _armedBoatMark.setLatLng(pos);
        } else {
          // GPS became available after map init — create the marker now
          _armedBoatMark = L.circleMarker(pos, {
            radius: 6, color: '#e2e8f0', weight: 2, fillColor: '#0f172a', fillOpacity: 1
          }).addTo(_armedMap);
        }
        if (_armedTrail && S.trail.length > 1) {
          _armedTrail.setLatLngs(S.trail.map(p => [p.lat, p.lon]));
        }
      }
    }
  }
  if (S.screen === 'configure') {
    const btn = document.getElementById('set-anchor-btn');
    if (btn && S.curLat !== null && btn.disabled) {
      const sm = Number(S.fArcSmall)||0, bi = Number(S.fArcBig)||1;
      const valid = S.cfgTab === 'normal' || sm < bi;
      if (valid) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = ''; btn.innerHTML = S.anchorSet ? '&#9875; Update Anchor' : '&#9875; Set Anchor'; }
    }
  }
  if (S.screen === 'map') renderMapUpdate();
}

// ─── SVG helpers ──────────────────────────────────────────────────────────
function svgRadiusDial(radius, distance, size) {
  size = size || 168;
  const c = size / 2, r = size / 2 - 14;
  const pct = radius > 0 ? Math.min(distance / radius, 1) : 0;
  const ang = (-90 + pct * 180) * Math.PI / 180;
  const bx = (c + Math.cos(ang) * r * 0.45).toFixed(1);
  const by = (c + Math.sin(ang) * r * 0.45).toFixed(1);
  return '<svg width="'+size+'" height="'+size+'" style="display:block"><circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.5"/><circle cx="'+c+'" cy="'+c+'" r="'+(r*0.5).toFixed(1)+'" fill="none" stroke="#1e2a38" stroke-width="1" stroke-dasharray="3 4"/><circle cx="'+c+'" cy="'+c+'" r="3.5" fill="#f59e0b"/><circle cx="'+bx+'" cy="'+by+'" r="5" fill="#22d3ee"/><line x1="'+c+'" y1="'+c+'" x2="'+bx+'" y2="'+by+'" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/></svg>';
}

function svgRelDial(bearing, size) {
  size = size || 168;
  const c = size / 2, r = size / 2 - 14;
  const rad = (bearing - 90) * Math.PI / 180;
  const ax = (c + Math.cos(rad) * r * 0.72).toFixed(1);
  const ay = (c + Math.sin(rad) * r * 0.72).toFixed(1);
  let ticks = '';
  [0,90,180,270].forEach(a => {
    const rr = (a - 90) * Math.PI / 180;
    ticks += '<line x1="'+(c+Math.cos(rr)*(r-6)).toFixed(1)+'" y1="'+(c+Math.sin(rr)*(r-6)).toFixed(1)+'" x2="'+(c+Math.cos(rr)*r).toFixed(1)+'" y2="'+(c+Math.sin(rr)*r).toFixed(1)+'" stroke="#7a9abf" stroke-width="1.5"/>';
  });
  return '<svg width="'+size+'" height="'+size+'" style="display:block"><circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#1e2a38" stroke-width="1"/>'+ticks+'<text x="'+c+'" y="'+(c-r-4)+'" text-anchor="middle" font-size="9" fill="#7a9abf" font-family="inherit">N</text><circle cx="'+c+'" cy="'+c+'" r="5" fill="#22d3ee"/><line x1="'+c+'" y1="'+c+'" x2="'+ax+'" y2="'+ay+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/><circle cx="'+ax+'" cy="'+ay+'" r="4.5" fill="#f59e0b"/></svg>';
}

function svgArcWedge(small, big, startAngle, endAngle, size) {
  size = size || 200;
  const c = size / 2, maxR = size / 2 - 18;
  const scale = big > 0 ? maxR / big : 1;
  const rS = small * scale, rB = big * scale;
  let span = endAngle - startAngle;
  if (span < 0) span += 360;
  if (span === 0) span = 360;
  function toXY(a, rad) { const r2 = (a - 90) * Math.PI / 180; return [(c + Math.cos(r2)*rad).toFixed(1), (c + Math.sin(r2)*rad).toFixed(1)]; }
  const steps = 24;
  const outerPts = [], innerPts = [];
  for (let i = 0; i <= steps; i++) {
    const a = startAngle + span * i / steps;
    outerPts.push(toXY(a, rB));
    innerPts.push(toXY(a, rS));
  }
  const pts = [...outerPts, ...innerPts.reverse()];
  const path = 'M ' + pts.map(p => p[0]+','+p[1]).join(' L ') + ' Z';
  return '<svg width="'+size+'" height="'+size+'" style="display:block"><circle cx="'+c+'" cy="'+c+'" r="'+maxR.toFixed(1)+'" fill="none" stroke="#1e2a38" stroke-width="1"/><circle cx="'+c+'" cy="'+c+'" r="'+rS.toFixed(1)+'" fill="none" stroke="#1e2a38" stroke-width="1" stroke-dasharray="2 4"/><path d="'+path+'" fill="#22d3ee" fill-opacity="0.18" stroke="#22d3ee" stroke-width="1.5"/><circle cx="'+c+'" cy="'+c+'" r="3.5" fill="#f59e0b"/><text x="'+c+'" y="'+(c-maxR-4).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#7a9abf" font-family="inherit">N</text></svg>';
}

// ─── Configure-screen map ────────────────────────────────────────────────────
function svgCfgMap() {
  const CX = 160, CY = 155, MAX_R = 115;
  const bg = '<rect width="320" height="280" fill="#0b2d3d"/>'+
    '<path d="M 0,35 Q 50,8 110,30 T 230,18 Q 275,12 320,28 L 320,0 L 0,0 Z" fill="#3a4a2e" opacity="0.9"/>'+
    '<text x="35" y="18" font-size="8" fill="#8aa68a" font-family="Rajdhani,sans-serif">SHORE</text>';
  let inner = '';
  if (S.cfgTab === 'normal') {
    const r = Math.max((S.fRadius || 30) * MAX_R / 100, 2);
    inner = '<circle cx="'+CX+'" cy="'+CY+'" r="'+r.toFixed(1)+'" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="2"/>'+
      '<circle cx="'+CX+'" cy="'+CY+'" r="4" fill="#f59e0b"/>'+
      '<text x="'+CX+'" y="'+(CY+r+16).toFixed(1)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#22d3ee" font-family="Rajdhani,sans-serif">'+S.fRadius+'m</text>';
  } else {
    const sm = Number(S.fArcSmall)||0, bi = Number(S.fArcBig)||1;
    const st = Number(S.fArcStart)||0, en = Number(S.fArcEnd)||0;
    const scale = bi > 0 ? MAX_R / bi : 1;
    const rS = sm * scale, rB = bi * scale;
    const valid = sm < bi;
    let span = en - st; if (span < 0) span += 360; if (span === 0) span = 360;
    function toXY(a, r) {
      const rad = (a - 90) * Math.PI / 180;
      return [(CX + Math.cos(rad)*r).toFixed(1), (CY + Math.sin(rad)*r).toFixed(1)];
    }
    const steps = 32, outer = [], innerPts = [];
    for (let i = 0; i <= steps; i++) {
      const a = st + span*i/steps;
      outer.push(toXY(a, rB)); innerPts.push(toXY(a, rS));
    }
    const pts = [...outer, ...innerPts.reverse()];
    const sPath = 'M ' + pts.map(p => p[0]+','+p[1]).join(' L ') + ' Z';
    const [sx, sy] = toXY(st, rB + 14), [ex, ey] = toXY(en, rB + 14);
    inner = '<circle cx="'+CX+'" cy="'+CY+'" r="'+rB.toFixed(1)+'" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 4"/>'+
      '<circle cx="'+CX+'" cy="'+CY+'" r="'+rS.toFixed(1)+'" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 4"/>'+
      (valid ? '<path d="'+sPath+'" fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="2"/>' : '')+
      '<circle cx="'+CX+'" cy="'+CY+'" r="4" fill="#f59e0b"/>'+
      '<text x="'+CX+'" y="'+(CY-MAX_R-4)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#7a9abf" font-family="Rajdhani,sans-serif">N</text>'+
      '<circle cx="'+sx+'" cy="'+sy+'" r="8" fill="#22d3ee" fill-opacity="0.3" stroke="#22d3ee" stroke-width="2"/>'+
      '<text x="'+sx+'" y="'+(Number(sy)+4).toFixed(1)+'" text-anchor="middle" font-size="8" font-weight="700" fill="#e2e8f0" font-family="Rajdhani,sans-serif">S</text>'+
      '<circle cx="'+ex+'" cy="'+ey+'" r="8" fill="#22d3ee" fill-opacity="0.3" stroke="#22d3ee" stroke-width="2"/>'+
      '<text x="'+ex+'" y="'+(Number(ey)+4).toFixed(1)+'" text-anchor="middle" font-size="8" font-weight="700" fill="#e2e8f0" font-family="Rajdhani,sans-serif">E</text>';
  }
  return '<svg width="100%" height="280" viewBox="0 0 320 280" style="display:block;border-radius:10px;overflow:hidden">'+bg+inner+'</svg>';
}

// ─── HTML helpers ──────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function topBar(title, backAction) {
  const back = backAction ? '<button class="back-btn" data-action="'+backAction+'">&#8249;</button>' : '<div style="width:24px;flex-shrink:0"></div>';
  return '<div class="top-bar">'+back+'<div class="top-bar-title">'+esc(title)+'</div><a href="oroboro.html" class="dash-btn">&#8592; Dashboard</a></div>';
}

function bottomNav(active) {
  return '<div class="bottom-nav">'+
    ['main','map','settings'].map(id => {
      const label = {main:'Anchor',map:'Swing',settings:'Settings'}[id];
      return '<button class="nav-btn'+(id===active?' active':'')+'" data-action="nav-'+id+'">'+label+'</button>';
    }).join('')+
  '</div>';
}

function statBlock(label, valueHtml, unit, colorStyle, big) {
  return '<div class="stat-block"><div class="stat-lbl">'+esc(label)+'</div><div class="stat-val'+(big?' big':'')+'"'+(colorStyle?' style="color:'+colorStyle+'"':'')+'>'+valueHtml+(unit?'<span class="stat-unit">'+esc(unit)+'</span>':'')+'</div></div>';
}

function fieldEl(label, fieldKey, value, unit) {
  return '<div><div class="field-lbl">'+esc(label)+'</div><div class="field-wrap"><input class="field-input" type="text" inputmode="decimal" value="'+esc(String(value))+'" data-field="'+fieldKey+'">'+(unit?'<span class="field-unit">'+esc(unit)+'</span>':'')+'</div></div>';
}

function toggleEl(actionKey, on) {
  const bg = on ? '#22d3ee' : '#1e2a38';
  const tb = on ? '#0a0e14' : '#374a5e';
  const tl = on ? 18 : 2;
  return '<button class="toggle" data-action="'+actionKey+'" style="background:'+bg+'" aria-pressed="'+on+'"><span class="toggle-thumb" style="left:'+tl+'px;background:'+tb+'"></span></button>';
}

// ─── Screen: Main ─────────────────────────────────────────────────────────
function renderAnchorBanner() {
  if (!S.skInitialized) return '<div style="font-size:10px;color:#f59e0b;padding:0 2px 8px">&#9679; CHECKING SIGNAL K&#8230;</div>';
  if (S.anchorSet)      return '<div style="font-size:10px;color:#5db832;padding:0 2px 8px">&#9679; ANCHOR SET &#8212; synced from Signal K</div>';
  return                       '<div style="font-size:10px;color:#7a9abf;padding:0 2px 8px">&#9679; NO ANCHOR SET</div>';
}

function renderMain() {
  const as = S.anchorSet;
  const d = S.distance !== null ? Math.round(S.distance) : '—';
  const maxD = S.maxDist > 0 ? Math.round(S.maxDist) : '—';
  const distColor = (S.distance !== null && S.distance > (S.arc?S.arc.big:S.radius)*0.8) ? '#f59e0b' : '#22d3ee';
  const modeBadge = '<span style="font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid #22d3ee;border-radius:4px;padding:3px 6px;flex-shrink:0">'+(S.activeMode==='advanced'?'ADV':'NRM')+'</span>';
  const modeSubtitle = S.activeMode === 'advanced' && S.arc
    ? 'Advanced: '+S.arc.small+'–'+S.arc.big+'m, '+S.arc.startAngle+'°–'+S.arc.endAngle+'°'
    : 'Normal: '+S.radius+'m radius';
  const banner = as
    ? '<div style="background:rgba(93,184,50,0.12);border:1.5px solid #5db832;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">'+
        '<span style="width:10px;height:10px;border-radius:50%;background:#5db832;flex-shrink:0;box-shadow:0 0 8px #5db832"></span>'+
        '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#e2e8f0">ANCHOR SET</div>'+
        '<div style="font-size:10px;color:#7a9abf">Synced from Signal K · '+modeSubtitle+'</div></div>'+
        modeBadge+'</div>'
    : renderAnchorBanner();
  const mapDiv = '<div id="armed-leaflet-map" style="height:240px;border-radius:10px;overflow:hidden;border:1px solid #1e2a38;background:#0b2d3d"></div>';
  const buttons = as
    ? '<button class="btn btn-secondary" data-action="go-configure">Adjust Distance</button>'+
      '<button class="btn btn-danger" style="margin-top:8px" data-action="raise-anchor">Raise Anchor</button>'
    : '<div style="font-size:11px;color:#7a9abf;text-align:center">No anchor set — use the dashboard anchor button.</div>';
  return topBar('Anchor Watch') +
    '<div class="screen-content">'+
      banner+
      mapDiv+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
        '<div class="stat-block"><div class="stat-lbl">Distance</div><div class="stat-val big"><span id="live-dist" style="color:'+distColor+'">'+(as?d:'—')+'</span>'+(as?'<span class="stat-unit">m</span>':'')+'</div></div>'+
        '<div class="stat-block"><div class="stat-lbl">Max Swing</div><div class="stat-val big"><span style="color:#f59e0b">'+(as && maxD!=='—'?maxD:'—')+'</span>'+(as && maxD!=='—'?'<span class="stat-unit">m</span>':'')+'</div></div>'+
        '<div class="stat-block"><div class="stat-lbl">AIS Nearby</div><div class="stat-val big"><span id="live-ais" style="color:#f59e0b">—</span></div></div>'+
      '</div>'+
      '<div style="flex:1"></div>'+
      '<div style="display:flex;flex-direction:column;gap:8px">'+buttons+'</div>'+
    '</div>'+
    bottomNav('main');
}

        '<input type="range" min="5" max="95" step="1" value="'+S.fArcSmall+'" data-field="fArcSmall" style="width:100%;accent-color:'+vcol+'">'+

// ─── Screen: Swing Map ────────────────────────────────────────────────────
function renderMap() {
  const size = 220, cx = size/2, cy = size/2, maxR = 95;
  const limitM = S.anchorSet ? (S.arc?S.arc.big:S.radius) : 30;
  const scaleFactor = maxR / Math.max(S.maxDist > 0 ? S.maxDist : limitM, 1);
  const limitCircleR = (limitM * scaleFactor).toFixed(1);
  let trailSvg = '', dotsSvg = '', boatSvg = '';
  if (S.trail.length > 1 && S.anchorSet) {
    const pts = S.trail.map(p => {
      const dx = haversine(S.anchorLat, S.anchorLon, S.anchorLat, p.lon) * (p.lon > S.anchorLon ? 1 : -1);
      const dy = haversine(S.anchorLat, S.anchorLon, p.lat, S.anchorLon) * (p.lat > S.anchorLat ? 1 : -1);
      return [(cx + dx*scaleFactor).toFixed(1), (cy - dy*scaleFactor).toFixed(1)];
    });
    trailSvg = '<polyline points="'+pts.map(p=>p[0]+','+p[1]).join(' ')+'" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.85"/>';
    dotsSvg  = pts.map(p=>'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.2" fill="#22d3ee" opacity="0.6"/>').join('');
    const lp = pts[pts.length-1];
    boatSvg = '<circle cx="'+lp[0]+'" cy="'+lp[1]+'" r="5" fill="#e2e8f0"/>';
  }
  const elapsed = S.watchStart ? fmtDuration(Date.now()-S.watchStart) : '—';
  const maxD = S.maxDist>0 ? Math.round(S.maxDist) : '—';
  const avgD = S.avgDistCount>0 ? Math.round(S.avgDistSum/S.avgDistCount) : '—';
  return topBar('Swing Track') +
    '<div class="screen-content">'+
      '<div style="background:#0d1520;border-radius:10px;border:1px solid #1e2a38;flex:1;display:flex;align-items:center;justify-content:center;min-height:220px">'+
        '<svg id="swing-svg" width="'+size+'" height="'+size+'">'+
          '<circle cx="'+cx+'" cy="'+cy+'" r="'+limitCircleR+'" fill="none" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1.5"/>'+
          trailSvg+dotsSvg+boatSvg+
          '<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#f59e0b"/>'+
        '</svg>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
        statBlock('Max Swing', String(maxD), maxD!=='—'?'m':'', maxD!=='—'?'#f59e0b':'')+
        statBlock('Avg Swing', String(avgD), avgD!=='—'?'m':'')+
        statBlock('Duration', elapsed)+
      '</div>'+
    '</div>'+
    bottomNav('map');
}

function renderMapUpdate() {
  if (document.getElementById('swing-svg')) render();
}

function fmtDuration(ms) {
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h>0 ? h+'h '+m+'m' : m+'m';
}

// ─── Screen: Pushover Config ───────────────────────────────────────────────
const EVENT_META = [
  { key: 'dragging',     label: 'Anchor Dragging Detected', hint: 'Fires when the boat moves outside the allowed distance.' },
  { key: 'gpsLost',      label: 'GPS Position Lost',        hint: 'Fires when no position update is received past the timeout.' },
  { key: 'anchorSet',    label: 'Anchor Set',               hint: 'Fires once when the watch is armed.' },
  { key: 'anchorRaised', label: 'Anchor Raised',            hint: 'Fires once when the watch is disarmed.' },
  { key: 'okCheckin',    label: 'Periodic OK Check-in',     hint: 'Optional heartbeat while anchored normally. Off by default.' },
];
const PRIOS = [{ id:-1, label:'Low' }, { id:0, label:'Normal' }, { id:2, label:'Emergency' }];

function renderPushover() {
  const cfg = S.pushover;
  const tokenDisplay = S.fPvShowToken ? esc(cfg.apiToken) : '';
  const tokenType = S.fPvShowToken ? 'text' : 'password';
  const tokenPlaceholder = !S.fPvShowToken && cfg.apiToken ? '(saved — tap Show to edit)' : '';

  const evRows = EVENT_META.map(meta => {
    const ev = cfg.events[meta.key];
    const expanded = S.pvExpanded === meta.key;
    const priosBtns = PRIOS.map(p => {
      const active = ev.priority === p.id;
      const bg = active ? (p.id===2?'#f87171':'#22d3ee') : '#0d1520';
      const col = active ? '#0a0e14' : '#7a9abf';
      return '<button style="flex:1;background:'+bg+';color:'+col+';border:none;border-radius:6px;padding:8px 4px;font-size:10px;font-weight:700;font-family:inherit;text-transform:uppercase;cursor:pointer" data-action="pv-prio" data-key="'+meta.key+'" data-prio="'+p.id+'">'+p.label+'</button>';
    }).join('');
    const details = expanded ? '<div class="event-row-details"><div><div style="font-size:9px;color:#7a9abf;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Priority</div><div style="display:flex;gap:6px">'+priosBtns+'</div></div>'+fieldEl('Title', 'pv-title-'+meta.key, ev.title)+fieldEl('Message', 'pv-msg-'+meta.key, ev.message)+'</div>' : '';
    return '<div class="event-row">'+
      '<div class="event-row-hdr" data-action="pv-expand-'+meta.key+'">'+
        '<div style="flex:1;padding-right:10px"><div style="font-size:13px;font-weight:600;color:#e2e8f0">'+esc(meta.label)+'</div><div style="font-size:10px;color:#7a9abf;margin-top:2px;line-height:1.4">'+esc(meta.hint)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:10px" onclick="event.stopPropagation()">'+toggleEl('pv-enabled-'+meta.key, ev.enabled)+'</div>'+
        '<span style="color:#7a9abf;font-size:14px;margin-left:6px">'+(expanded?'&#9662;':'&#8250;')+'</span>'+
      '</div>'+
      details+
    '</div>';
  }).join('');

  return topBar('Pushover Notifications', 'go-settings') +
    '<div class="screen-content">'+
      '<div class="card" style="display:flex;flex-direction:column;gap:10px">'+
        fieldEl('Pushover User / Group Key', 'pv-userkey', cfg.userKey)+
        '<div><div class="field-lbl">API Token</div><div class="field-wrap"><input class="field-input" type="'+tokenType+'" value="'+tokenDisplay+'" placeholder="'+esc(tokenPlaceholder)+'" data-field="pv-apitoken" autocomplete="off"><button style="background:none;border:none;color:#22d3ee;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;flex-shrink:0" data-action="pv-toggle-token">'+(S.fPvShowToken?'Hide':'Show')+'</button></div></div>'+
        '<div style="font-size:10px;color:#7a9abf;line-height:1.4">Find these at pushover.net under your dashboard and your registered Application.</div>'+
      '</div>'+
      '<div><div style="font-size:11px;color:#22d3ee;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Events</div><div style="display:flex;flex-direction:column;gap:8px">'+evRows+'</div></div>'+
      '<button class="btn btn-secondary" id="test-btn" data-action="pv-test">Send Test Notification</button>'+
      '<button class="btn btn-primary" data-action="go-settings">Save Changes</button>'+
    '</div>';
}

// ─── Main render ──────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  destroyMaps();
  switch(S.screen) {
    case 'main':         app.innerHTML = renderMain(); break;
    case 'configure':    app.innerHTML = renderConfigure(); break;
    case 'map':          app.innerHTML = renderMap(); break;
    case 'settings':     app.innerHTML = renderSettings(); break;
    case 'pushover':     app.innerHTML = renderPushover(); break;
    default:             app.innerHTML = renderConfigure();
  }
  setTimeout(initMapIfNeeded, 0);
}

// ─── Event delegation ─────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  handleAction(btn.dataset.action, btn).catch(err => showProxyError(err.message || 'Error'));
});

document.addEventListener('input', e => {
  const el = e.target.closest('[data-field]');
  if (!el) return;
  handleField(el.dataset.field, el.value);
});

async function handleAction(action, btn) {
  // Nav
  if (action === 'nav-main' || action === 'go-main') { S.screen = 'main'; render(); return; }
  if (action === 'nav-map')  { S.screen = 'map'; render(); return; }
  if (action === 'nav-settings' || action === 'go-settings') { S.screen = 'settings'; render(); return; }
  if (action === 'go-pushover') { S.fPvShowToken = false; S.screen = 'pushover'; render(); return; }
  if (action === 'go-configure') { S.cfgTab = S.activeMode; S.screen = 'configure'; render(); return; }

  // Configure tab
  if (action === 'cfg-tab-normal')   { S.cfgTab = 'normal';   render(); return; }
  if (action === 'cfg-tab-advanced') { S.cfgTab = 'advanced'; render(); return; }

  // Set anchor — write radius FIRST, then position
  if (action === 'set-anchor-confirm') {
    if (S.curLat === null) { showProxyError('No GPS — wait for Signal K'); return; }
    if (S.cfgTab === 'advanced' && Number(S.fArcSmall) >= Number(S.fArcBig)) return;
    // 1. Commit zone
    const rad = S.cfgTab === 'normal' ? S.fRadius : Number(S.fArcBig);
    if (S.cfgTab === 'normal') {
      S.radius = S.fRadius; S.arc = null;
    } else {
      S.arc = { small: Number(S.fArcSmall), big: Number(S.fArcBig), startAngle: Number(S.fArcStart), endAngle: Number(S.fArcEnd) };
      S.radius = S.arc.big;
    }
    S.activeMode = S.cfgTab;
    // 2. Calc anchor position from placement
    const ap = destinationPoint(S.curLat, S.curLon, S.fAnchorDist, S.fAnchorBearing);
    S.anchorLat = ap.lat; S.anchorLon = ap.lon;
    // 3. Write radius FIRST
    try {
      const r1 = await fetch(PROXY_URL+'/api/anchor/radius', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({value:rad})});
      const d1 = await r1.json().catch(()=>({}));
      if (!r1.ok || d1.ok===false) { showProxyError(d1.error||'Failed to write radius (HTTP '+r1.status+')'); return; }
      // 4. Write position
      const r2 = await fetch(PROXY_URL+'/api/anchor/set', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({latitude:S.anchorLat, longitude:S.anchorLon})});
      const d2 = await r2.json().catch(()=>({}));
      if (!r2.ok || d2.ok===false) { showProxyError(d2.error||'Failed to write position (HTTP '+r2.status+')'); return; }
    } catch(e) { showProxyError('Proxy unreachable — check anchor-api service'); return; }
    // 5. Arm
    S.anchorSet = true; S.watchStart = Date.now();
    S.trail = []; S.maxDist = 0; S.avgDistSum = 0; S.avgDistCount = 0;
    S.draggingAlert = false; S.alarmAcknowledged = false; hideAlarm();
    S.alarmSuppressed = true; S.lastAlarmState = 'ok'; // suppression cleared by poll() once SK confirms
    sendPushover('anchorSet');
    S.screen = 'main'; render(); return;
  }

  // Raise anchor
  if (action === 'raise-anchor') {
    sendPushover('anchorRaised');
    putAnchorPosition(null, null); // clear in SK so other devices see it
    S.anchorSet = false; S.anchorLat = null; S.anchorLon = null;
    S.arc = null; S.distance = null; S.bearing = null;
    S.draggingAlert = false; S.alarmAcknowledged = false; S.alarmSuppressed = false; S.lastAlarmState = 'ok';
    S.trail = []; S.maxDist = 0; S.avgDistSum = 0; S.avgDistCount = 0; S.watchStart = null;
    hideAlarm(); S.screen = 'configure'; render(); return;
  }

  // Pushover screen actions
  if (action === 'pv-toggle-token') { S.fPvShowToken = !S.fPvShowToken; render(); return; }
  if (action.startsWith('pv-expand-')) {
    const key = action.slice(10);
    S.pvExpanded = (S.pvExpanded === key) ? null : key;
    render(); return;
  }
  if (action === 'pv-prio') {
    const key = btn.dataset.key, prio = parseInt(btn.dataset.prio, 10);
    if (S.pushover.events[key]) { S.pushover.events[key].priority = prio; render(); }
    return;
  }
  if (action.startsWith('pv-enabled-')) {
    const key = action.slice(11);
    if (S.pushover.events[key]) { S.pushover.events[key].enabled = !S.pushover.events[key].enabled; render(); }
    return;
  }
  if (action === 'pv-test') {
    sendPushoverTest();
    const tb = document.getElementById('test-btn');
    if (tb) { tb.textContent = 'Test Sent ✓'; tb.disabled = true; setTimeout(() => { tb.textContent = 'Send Test Notification'; tb.disabled = false; }, 2500); }
    return;
  }

  // Alarm
  if (action === 'ack-alarm') { hideAlarm(); return; }
}

function handleField(field, value) {
  switch(field) {
    case 'fRelDist':    S.fRelDist = value; break;
    case 'fRelBearing':
      S.fRelBearing = value;
      const rd = document.getElementById('rel-dial');
      if (rd) rd.innerHTML = svgRelDial(Number(value)||0);
      break;
    case 'fAnchorDist': {
      S.fAnchorDist = Number(value)||5;
      const v = document.getElementById('cfg-adist-val'); if (v) v.textContent = S.fAnchorDist+'m';
      const c = document.getElementById('cfg-compass'); if (c) c.innerHTML = svgCompassDial(S.fAnchorDist, S.fAnchorBearing);
      updateConfigureMapZone(); break;
    }
    case 'fAnchorBearing': {
      S.fAnchorBearing = Number(value)||0;
      const v = document.getElementById('cfg-abearing-val'); if (v) v.textContent = S.fAnchorBearing+'°';
      const c = document.getElementById('cfg-compass'); if (c) c.innerHTML = svgCompassDial(S.fAnchorDist, S.fAnchorBearing);
      updateConfigureMapZone(); break;
    }
    case 'fRadius': {
      S.fRadius = Number(value) || 10;
      const rv = document.getElementById('cfg-radius-val');
      if (rv) rv.textContent = S.fRadius + 'm';
      updateConfigureMapZone();
      break;
    }
    case 'fArcSmall': {
      S.fArcSmall = value; updateConfigureMapZone();
      const sm = Number(value)||0, bi = Number(S.fArcBig)||1, v2 = sm < bi;
      const c = v2 ? '#22d3ee' : '#f87171';
      const sv = document.getElementById('cfg-small-val'); if (sv) { sv.textContent = value+'m'; sv.style.color = c; }
      const bv = document.getElementById('cfg-big-val');   if (bv) bv.style.color = c;
      const er = document.getElementById('cfg-arc-error'); if (er) er.style.display = v2 ? 'none' : 'block';
      const btn = document.getElementById('set-anchor-btn'); if (btn) { btn.disabled = !v2; btn.style.opacity = v2?'1':'0.4'; btn.style.cursor = v2?'':'not-allowed'; }
      break;
    }
    case 'fArcBig': {
      S.fArcBig = value; updateConfigureMapZone();
      const sm = Number(S.fArcSmall)||0, bi = Number(value)||1, v2 = sm < bi;
      const c = v2 ? '#22d3ee' : '#f87171';
      const sv = document.getElementById('cfg-small-val'); if (sv) sv.style.color = c;
      const bv = document.getElementById('cfg-big-val');   if (bv) { bv.textContent = value+'m'; bv.style.color = c; }
      const er = document.getElementById('cfg-arc-error'); if (er) er.style.display = v2 ? 'none' : 'block';
      const btn = document.getElementById('set-anchor-btn'); if (btn) { btn.disabled = !v2; btn.style.opacity = v2?'1':'0.4'; btn.style.cursor = v2?'':'not-allowed'; }
      break;
    }
    case 'fArcStart': {
      S.fArcStart = value; updateConfigureMapZone();
      const sv = document.getElementById('cfg-start-val'); if (sv) sv.textContent = value + '°';
      break;
    }
    case 'fArcEnd': {
      S.fArcEnd = value; updateConfigureMapZone();
      const ev = document.getElementById('cfg-end-val'); if (ev) ev.textContent = value + '°';
      break;
    }
    case 'pv-userkey':  S.pushover.userKey  = value; break;
    case 'pv-apitoken': if (S.fPvShowToken) S.pushover.apiToken = value; break;
    default:
      if (field.startsWith('pv-title-')) {
        const k = field.slice(9);
        if (S.pushover.events[k]) S.pushover.events[k].title = value;
      } else if (field.startsWith('pv-msg-')) {
        const k = field.slice(7);
        if (S.pushover.events[k]) S.pushover.events[k].message = value;
      }
  }
}

function updateCfgMap() {
  const el = document.getElementById('cfg-map');
  if (el) el.innerHTML = svgCfgMap();
}

// ─── Compass placement dial ───────────────────────────────────────────────
function svgCompassDial(dist, bearing) {
  const cx=60, cy=60, r=45;
  const rad=(bearing-90)*Math.PI/180;
  const ax=(cx+Math.cos(rad)*r*0.7).toFixed(1), ay=(cy+Math.sin(rad)*r*0.7).toFixed(1);
  const cards=['N','E','S','W'];
  const ticks=[0,90,180,270].map(a=>{
    const tr=(a-90)*Math.PI/180;
    return '<text x="'+(cx+Math.cos(tr)*(r+10)).toFixed(1)+'" y="'+(cy+Math.sin(tr)*(r+10)+3).toFixed(1)+'" text-anchor="middle" font-size="8" fill="#7a9abf" font-family="Rajdhani,sans-serif">'+cards[a/90]+'</text>';
  }).join('');
  return '<svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1e2a38" stroke-width="1"/>'+ticks+
    '<line x1="'+cx+'" y1="'+cy+'" x2="'+ax+'" y2="'+ay+'" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3 2"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#e2e8f0"/>'+
    '<text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" font-size="6" fill="#0a0e14" font-weight="700" font-family="Rajdhani,sans-serif">B</text>'+
    '<circle cx="'+ax+'" cy="'+ay+'" r="5" fill="#f59e0b"/>'+
    '<text x="'+((cx+Number(ax))/2+8).toFixed(1)+'" y="'+((cy+Number(ay))/2).toFixed(1)+'" font-size="9" fill="#22d3ee" font-weight="700" font-family="Rajdhani,sans-serif">'+dist+'m</text>'+
    '</svg>';
}

function renderAnchorPlacement() {
  return '<div style="background:#0d1520;border-radius:10px;border:1px solid #1e2a38;padding:14px;display:flex;gap:14px;align-items:center">'+
    '<div id="cfg-compass">'+svgCompassDial(S.fAnchorDist, S.fAnchorBearing)+'</div>'+
    '<div style="flex:1;display:flex;flex-direction:column;gap:10px">'+
      '<div style="font-size:10px;color:#7a9abf;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Anchor Position</div>'+
      '<div style="padding:0 4px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
          '<span style="font-size:9px;color:#7a9abf;text-transform:uppercase">Distance to anchor</span>'+
          '<span id="cfg-adist-val" style="font-size:16px;font-weight:700;color:#22d3ee">'+S.fAnchorDist+'m</span>'+
        '</div>'+
        '<input type="range" min="5" max="80" step="1" value="'+S.fAnchorDist+'" data-field="fAnchorDist" style="width:100%;accent-color:#22d3ee">'+
      '</div>'+
      '<div style="padding:0 4px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
          '<span style="font-size:9px;color:#7a9abf;text-transform:uppercase">Bearing to anchor</span>'+
          '<span id="cfg-abearing-val" style="font-size:16px;font-weight:700;color:#22d3ee">'+S.fAnchorBearing+'°</span>'+
        '</div>'+
        '<input type="range" min="0" max="359" step="1" value="'+S.fAnchorBearing+'" data-field="fAnchorBearing" style="width:100%;accent-color:#22d3ee">'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ─── Geo sector polygon (for Leaflet) ─────────────────────────────────────
function geoSectorPoints(lat, lon, small, big, startAngle, endAngle) {
  let span = endAngle - startAngle;
  if (span < 0) span += 360;
  if (span === 0) span = 360;
  const steps = 32, outer = [], inner = [];
  for (let i = 0; i <= steps; i++) {
    const a = startAngle + span * i / steps;
    const po = destinationPoint(lat, lon, big, a);
    const pi = destinationPoint(lat, lon, small, a);
    outer.push([po.lat, po.lon]);
    inner.push([pi.lat, pi.lon]);
  }
  return [...outer, ...inner.reverse()];
}

function calcAnchorLatLon() {
  if (S.curLat === null) return null;
  return destinationPoint(S.curLat, S.curLon, S.fAnchorDist, S.fAnchorBearing);
}

// ─── Map lifecycle ────────────────────────────────────────────────────────
function destroyMaps() {
  if (_cfgMap)   { try { _cfgMap.remove(); }   catch(e){} _cfgMap = null; _cfgZone = null; _cfgAnchorMark = null; }
  if (_armedMap) { try { _armedMap.remove(); } catch(e){} _armedMap = null; _armedZone = null; _armedBoatMark = null; _armedAnchorMark = null; _armedTrail = null; _armedAis = []; }
}

function makeTileLayer(map) {
  if (typeof L === 'undefined') return;
  const tile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CartoDB', maxZoom: 19
  });
  tile.on('tileerror', function() {
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM', maxZoom: 19 }).addTo(map);
  });
  tile.addTo(map);
}

function initConfigureMap() {
  if (typeof L === 'undefined') return;
  const el = document.getElementById('cfg-leaflet-map');
  if (!el || _cfgMap) return;
  const center = S.curLat !== null ? [S.curLat, S.curLon] : [0, 0];
  _cfgMap = L.map(el, { zoomControl: false, scrollWheelZoom: false, attributionControl: false });
  L.control.zoom({ position: 'bottomright' }).addTo(_cfgMap);
  makeTileLayer(_cfgMap);
  _cfgMap.setView(center, 17);
  updateConfigureMapZone();
}

function updateConfigureMapZone() {
  if (!_cfgMap) return;
  if (_cfgZone)       { _cfgMap.removeLayer(_cfgZone);       _cfgZone = null; }
  if (_cfgAnchorMark) { _cfgMap.removeLayer(_cfgAnchorMark); _cfgAnchorMark = null; }
  const ap = calcAnchorLatLon();
  if (!ap) return;
  const aLatLon = [ap.lat, ap.lon];
  _cfgAnchorMark = L.circleMarker(aLatLon, { radius: 6, color: '#f59e0b', fillColor: '#f59e0b', fillOpacity: 1 }).addTo(_cfgMap);
  if (S.cfgTab === 'normal') {
    _cfgZone = L.circle(aLatLon, { radius: S.fRadius, color: '#22d3ee', fillColor: '#22d3ee', fillOpacity: 0.12, weight: 2 }).addTo(_cfgMap);
  } else {
    const sm = Number(S.fArcSmall)||0, bi = Number(S.fArcBig)||1;
    if (sm < bi) {
      const pts = geoSectorPoints(ap.lat, ap.lon, sm, bi, Number(S.fArcStart), Number(S.fArcEnd));
      _cfgZone = L.polygon(pts, { color: '#22d3ee', fillColor: '#22d3ee', fillOpacity: 0.18, weight: 2 }).addTo(_cfgMap);
    }
  }
  const bounds = _cfgZone ? _cfgZone.getBounds() : null;
  if (bounds && bounds.isValid()) _cfgMap.fitBounds(bounds, { padding: [24, 24] });
}

function initArmedMap() {
  if (typeof L === 'undefined') return;
  const el = document.getElementById('armed-leaflet-map');
  if (!el || _armedMap || !S.anchorSet) return;
  const anchorPos = S.anchorLat !== null ? [S.anchorLat, S.anchorLon] : (S.curLat !== null ? [S.curLat, S.curLon] : [0,0]);
  _armedMap = L.map(el, { zoomControl: false, scrollWheelZoom: false, attributionControl: false });
  L.control.zoom({ position: 'bottomright' }).addTo(_armedMap);
  makeTileLayer(_armedMap);
  _armedMap.setView(anchorPos, 16);
  // Anchor marker — amber circleMarker avoids divIcon iconSize/clip issues
  if (S.anchorLat !== null) {
    _armedAnchorMark = L.circleMarker([S.anchorLat, S.anchorLon], {
      radius: 8, color: '#fff', weight: 2, fillColor: '#f59e0b', fillOpacity: 1
    }).addTo(_armedMap);
  }
  // Boat position marker — created lazily in updateLive() if GPS not yet available
  if (S.curLat !== null) {
    _armedBoatMark = L.circleMarker([S.curLat, S.curLon], {
      radius: 6, color: '#e2e8f0', weight: 2, fillColor: '#0f172a', fillOpacity: 1
    }).addTo(_armedMap);
  }
  _armedTrail = L.polyline(
    S.trail.length > 1 ? S.trail.map(p => [p.lat, p.lon]) : [],
    { color: '#22d3ee', weight: 1.5, opacity: 0.7 }
  ).addTo(_armedMap);
  updateArmedMapZone();
  updateAISOnMap();
  // Try to seed trail from SK tracks plugin
  fetch('http://'+SK_HOST+':'+SK_PORT+'/signalk/v1/api/vessels/self/navigation/track?limit=500')
    .then(r => r.ok ? r.json() : null)
    .then(geo => {
      if (!geo || !Array.isArray(geo.coordinates)) return;
      const pts = geo.coordinates.map(c => [c[1], c[0]]); // GeoJSON [lon,lat] → Leaflet [lat,lon]
      if (pts.length > 1 && _armedTrail) _armedTrail.setLatLngs(pts);
    })
    .catch(() => {});
}

function updateArmedMapZone() {
  if (!_armedMap || !S.anchorSet) return;
  if (_armedZone) { _armedMap.removeLayer(_armedZone); _armedZone = null; }
  if (S.arc) {
    const pts = geoSectorPoints(S.anchorLat, S.anchorLon, S.arc.small, S.arc.big, S.arc.startAngle, S.arc.endAngle);
    _armedZone = L.polygon(pts, { color: '#22d3ee', fillColor: '#22d3ee', fillOpacity: 0.12, weight: 2 }).addTo(_armedMap);
  } else {
    _armedZone = L.circle([S.anchorLat, S.anchorLon], { radius: S.radius, color: '#22d3ee', fillColor: '#22d3ee', fillOpacity: 0.12, weight: 2 }).addTo(_armedMap);
  }
  if (_armedZone) {
    const b = _armedZone.getBounds ? _armedZone.getBounds() : null;
    if (b && b.isValid()) _armedMap.fitBounds(b, { padding: [20, 20] });
  }
}

async function updateAISOnMap() {
  if (typeof L === 'undefined' || !_armedMap) return;
  _armedAis.forEach(m => { try { _armedMap.removeLayer(m); } catch(e){} });
  _armedAis = [];
  try {
    const r = await fetch('http://'+SK_HOST+':'+SK_PORT+'/signalk/v1/api/vessels');
    if (!r.ok) return;
    const vessels = await r.json();
    let count = 0;
    Object.entries(vessels).forEach(([mmsi, v]) => {
      if (mmsi === 'self') return;
      const pos = v.navigation && v.navigation.position && v.navigation.position.value;
      if (!pos || pos.latitude == null) return;
      const name = (v.name && v.name.value) || (v.mmsi && v.mmsi.value) || mmsi;
      const dist = S.curLat !== null ? Math.round(haversine(S.curLat, S.curLon, pos.latitude, pos.longitude)) : null;
      const icon = L.divIcon({ html: '<div style="color:#f59e0b;font-size:16px;line-height:1">&#9650;</div><div style="font-size:8px;color:#f59e0b;white-space:nowrap;text-align:center">'+name+(dist?'<br>'+dist+'m':'')+'</div>', className: '', iconAnchor: [8,8] });
      const m = L.marker([pos.latitude, pos.longitude], { icon }).addTo(_armedMap);
      _armedAis.push(m);
      count++;
    });
    const el = document.getElementById('live-ais');
    if (el) el.textContent = count;
  } catch(e) {}
}

function initMapIfNeeded() {
  if (S.screen === 'configure') initConfigureMap();
  else if (S.screen === 'main') initArmedMap();
}

// ─── Init ─────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  render(); // initial render — configure screen while SK state is unknown
  await fetchAnchorState();
  // Route: if SK says anchor is already set, go directly to armed screen
  if (S.anchorSet) { S.screen = 'main'; render(); }
  setInterval(poll, 1000);
});
</script>
