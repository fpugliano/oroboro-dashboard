<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Anchor Watch — Oroboro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0e14;color:#e2e8f0;font-family:'Rajdhani',system-ui,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ── Bottom nav ── */
#bottom-nav{display:flex;background:#151c28;border-top:.5px solid #1e2a38;flex-shrink:0;padding:6px 0 10px}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;font-size:9px;font-weight:700;letter-spacing:.03em;cursor:pointer;padding:4px 0;color:#7a9abf;text-transform:uppercase}
.nav-btn.active{color:#22d3ee}
.nav-btn span:first-child{font-size:18px}

/* ── Tab content ── */
.tab{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column}
.tab.visible{display:flex}

/* ── Main screen ── */
#tab-main{padding:0}
.stat-rows{padding:12px 18px 0}
.stat-row{display:flex;padding:10px 0;border-bottom:.5px solid #1e2a38}
.stat-cell{flex:1}
.stat-label{font-size:9px;color:#7a9abf;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;color:#e2e8f0;line-height:1.1}
.stat-value.cyan{color:#22d3ee}
.stat-value.amber{color:#f59e0b}
.stat-value.red{color:#f87171}
.stat-value.muted{color:#7a9abf}
.main-btns{display:flex;gap:12px;padding:18px}
.btn{border-radius:8px;padding:15px 12px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-family:inherit;cursor:pointer;border:none;line-height:1.3}
.btn-outline-cyan{background:transparent;border:2px solid #22d3ee;color:#22d3ee}
.btn-blue{background:#60a5fa;color:#e2e8f0}
.btn-outline-red{background:transparent;border:2px solid #f87171;color:#f87171}
.btn-full{width:100%}
.flex-grow{flex:1}

/* ── Status banner ── */
#status-banner{display:none;flex-shrink:0;padding:8px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-align:center}
#status-banner.alarm{display:block;background:#7f1d1d;color:#fca5a5}
#status-banner.warning{display:block;background:#78350f;color:#fcd34d}

/* ── Alarm overlay ── */
#alarm-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(127,29,29,.92);flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:32px}
#alarm-overlay.active{display:flex}
.alarm-ring{width:80px;height:80px;border-radius:50%;border:4px solid #f87171;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#f87171;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
.alarm-title{font-size:28px;font-weight:900;color:#fca5a5;text-transform:uppercase}
.alarm-detail{font-size:14px;color:#fca5a5;max-width:280px;line-height:1.4}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:24px}
.modal-card{background:#1a2030;border-radius:16px;padding:24px 22px;width:100%;max-width:340px;box-shadow:0 20px 40px rgba(0,0,0,.5)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:#7a9abf;margin-bottom:18px}
.modal-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-label{font-size:13px;color:#7a9abf}
.modal-input-wrap{display:flex;align-items:center;gap:4px}
.modal-input{background:#0a0e14;border:1px solid #1e2a38;color:#e2e8f0;font-size:20px;font-weight:700;font-family:inherit;text-align:center;border-radius:6px;padding:6px 4px;width:70px}
.modal-input.large{width:90px;font-size:28px;padding:8px 4px}
.modal-input.invalid{border-color:#f87171}
.modal-unit{font-size:13px;color:#7a9abf}
.modal-err{font-size:11px;color:#f87171;text-align:center;margin-top:-8px;margin-bottom:4px}
.modal-btn-set{margin-top:16px;border-radius:8px;padding:12px;font-size:14px;font-weight:800;text-transform:uppercase;font-family:inherit;cursor:pointer;border:none;width:100%}
.tab-toggle{display:flex;background:#0a0e14;border-radius:8px;padding:3px;margin-bottom:16px}
.tab-toggle-btn{flex:1;background:transparent;border:none;border-radius:6px;padding:8px 0;font-size:12px;font-weight:700;letter-spacing:.04em;font-family:inherit;cursor:pointer;color:#7a9abf}
.tab-toggle-btn.active{background:rgba(122,154,191,.2);color:#e2e8f0}
.choice-btn{display:block;width:100%;background:rgba(122,154,191,.1);border:none;color:#e2e8f0;border-radius:10px;padding:14px 16px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:8px;text-align:left}
.choice-btn:hover{background:rgba(122,154,191,.18)}

/* ── Map tab ── */
#tab-map{padding:0;position:relative}
#leaflet-map{flex:1;min-height:300px}
.leaflet-container{background:#aad3df}

/* ── History tab ── */
#tab-history{padding:0}
.history-day-header{font-size:13px;color:#7a9abf;text-align:center;padding:12px 0 8px;background:rgba(122,154,191,.06)}
.history-entry{padding:12px 20px;border-bottom:.5px solid #1e2a38;cursor:pointer}
.history-entry:hover{background:rgba(122,154,191,.05)}
.history-pos{font-size:18px;font-weight:700;color:#22d3ee}
.history-time{font-size:11px;color:#7a9abf;margin-top:2px}
.history-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#7a9abf;font-size:14px}

/* ── Settings tab ── */
#tab-settings{padding:18px}
.settings-section{margin-bottom:24px}
.settings-heading{font-size:11px;color:#22d3ee;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:.5px solid #1e2a38}
.settings-label{font-size:14px;font-weight:600}
.settings-sub{font-size:11px;color:#7a9abf;margin-top:2px}
.settings-input-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.settings-input-label{font-size:11px;color:#7a9abf;text-transform:uppercase;letter-spacing:.06em}
.settings-input{background:#111820;border:1px solid #1e2a38;color:#e2e8f0;font-size:14px;font-family:inherit;padding:10px 12px;border-radius:8px;width:100%}
.prio-btns{display:flex;gap:6px}
.prio-btn{border:1px solid #1e2a38;background:transparent;color:#7a9abf;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.prio-btn.active{background:#22d3ee22;border-color:#22d3ee;color:#22d3ee}
.toggle-sw{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-sw .track{position:absolute;inset:0;background:#1e2a38;border-radius:11px;transition:.2s}
.toggle-sw input:checked+.track{background:#22d3ee44}
.toggle-sw .thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#7a9abf;border-radius:50%;transition:.2s}
.toggle-sw input:checked~.thumb{background:#22d3ee;left:21px}

/* ── Proxy error toast ── */
#proxy-err{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#7f1d1d;color:#fca5a5;font-size:12px;font-weight:600;font-family:inherit;padding:8px 16px;border-radius:8px;border:1px solid #f87171;z-index:999;max-width:calc(100vw - 32px);text-align:center}

/* ── Loading screen ── */
#loading{position:fixed;inset:0;z-index:1000;background:#0a0e14;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#7a9abf;font-size:14px}
#loading.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid #1e2a38;border-top-color:#22d3ee;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading anchor state…</span>
</div>

<div id="app" style="display:none">
  <div id="status-banner"></div>

  <!-- ── Main tab ── -->
  <div id="tab-main" class="tab visible">
    <div class="stat-rows">
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">Current Position</div>
          <div class="stat-value" id="val-cur-pos">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Anchor Position</div>
          <div class="stat-value" id="val-anc-pos">—</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">GPS Accuracy</div>
          <div class="stat-value" id="val-accuracy">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Anchor Distance</div>
          <div class="stat-value" id="val-distance">—</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">Last GPS Update</div>
          <div class="stat-value" id="val-gps-age">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Anchor Bearing</div>
          <div class="stat-value" id="val-bearing">—</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">Battery</div>
          <div class="stat-value" id="val-battery">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Allowed Distance</div>
          <div class="stat-value cyan" id="val-allowed">—</div>
        </div>
      </div>
    </div>
    <div class="flex-grow"></div>
    <div class="main-btns">
      <button class="btn btn-outline-cyan" style="flex:1" id="btn-set-distance">Set Allowed<br/>Distance</button>
      <button class="btn btn-blue" style="flex:1.5" id="btn-set-anchor">Set Anchor</button>
    </div>
  </div>

  <!-- ── Map tab ── -->
  <div id="tab-map" class="tab">
    <div id="leaflet-map"></div>
  </div>

  <!-- ── History tab ── -->
  <div id="tab-history" class="tab">
    <div style="font-size:20px;font-weight:700;text-align:center;padding:18px 0 12px;flex-shrink:0">Anchor history</div>
    <div id="history-list" style="flex:1;overflow-y:auto"></div>
  </div>

  <!-- ── Settings tab ── -->
  <div id="tab-settings" class="tab"></div>

  <!-- ── Bottom nav ── -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="tab-main"><span>★</span>Main</button>
    <button class="nav-btn" data-tab="tab-map"><span>🗺</span>Map</button>
    <button class="nav-btn" data-tab="tab-history"><span>📍</span>Anchor history</button>
    <button class="nav-btn" data-tab="tab-settings"><span>⚙</span>Settings</button>
  </nav>
</div>

<!-- ── Alarm overlay ── -->
<div id="alarm-overlay">
  <div class="alarm-ring">!</div>
  <div class="alarm-title" id="alarm-title">ANCHOR DRAGGING</div>
  <div class="alarm-detail" id="alarm-detail"></div>
  <button class="btn btn-outline-cyan btn-full" id="btn-ack-alarm" style="max-width:280px;margin-top:8px">Acknowledge</button>
</div>

<!-- ── Proxy error toast ── -->
<div id="proxy-err"></div>

<script>
// ─── Config (injected by server) ──────────────────────────────────────────
const CFG        = (typeof DASHBOARD_CONFIG !== 'undefined') ? DASHBOARD_CONFIG : {};
const SK_HOST    = (CFG.signalk && CFG.signalk.host) || window.location.hostname || '192.168.1.238';
const SK_PORT    = (CFG.signalk && CFG.signalk.port) || 3000;
const PROXY_PORT = 3001;
const SK_BASE    = 'http://' + SK_HOST + ':' + SK_PORT;
const PROXY_BASE = 'http://' + SK_HOST + ':' + PROXY_PORT;
const SELF_URL   = SK_BASE + '/signalk/v1/api/vessels/self';
const ANCHOR_URL = SELF_URL + '/navigation/anchor';
const pvCfg      = (CFG.anchor && CFG.anchor.pushover) || {};

// ─── State ────────────────────────────────────────────────────────────────
// All persistent values come from SK or proxy config — never from defaults after first load.
const S = {
  // anchor state (from SK)
  anchorSet: false,
  anchorLat: null, anchorLon: null,

  // zone config (from proxy /api/anchor/config)
  mode: 'normal',
  radius: 30,
  small: 20, big: 40, startAngle: 0, endAngle: 90,
  history: [],

  // live GPS (from SK poll)
  curLat: null, curLon: null,
  gpsAccuracy: null, lastGpsFix: null,
  distance: null, bearing: null,
  battery: null,

  // alarm state
  alarmAcknowledged: false,
  lastAlarmState: 'ok',   // 'ok' | 'dragging' | 'gps-lost'
  alarmSuppressed: false, // true during Set Anchor flow until first confirmed SK poll
  lastPushover: {},

  // pushover config
  pushover: {
    userKey:  pvCfg.userKey  || '',
    apiToken: pvCfg.apiToken || '',
    events: Object.assign({
      dragging:     { enabled: true,  priority: 2,  title: '⚠️ Anchor Dragging!',        message: 'S/V Oroboro is dragging anchor.' },
      gpsLost:      { enabled: true,  priority: 2,  title: '⚠️ Anchor Alarm: GPS Lost',  message: 'No GPS position updates received.' },
      anchorSet:    { enabled: true,  priority: 0,  title: 'Anchor Set',                 message: 'Anchor alarm armed on S/V Oroboro.' },
      anchorRaised: { enabled: true,  priority: 0,  title: 'Anchor Raised',              message: 'Anchor alarm disarmed on S/V Oroboro.' },
    }, (pvCfg.events || {})),
  },

  // map / trail
  trail: [],
  maxDist: 0,
  watchStart: null,

  // UI
  activeModal: null,   // null | 'setDistance' | 'setAnchor' | 'relative' | 'custom' | 'cancel'
  activeTab: 'tab-main',
  pvShowToken: false,
};

// ─── Math ─────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, p1 = lat1*Math.PI/180, p2 = lat2*Math.PI/180;
  const dp = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function bearingTo(lat1, lon1, lat2, lon2) {
  const p1=lat1*Math.PI/180, p2=lat2*Math.PI/180, dl=(lon2-lon1)*Math.PI/180;
  return (Math.atan2(Math.sin(dl)*Math.cos(p2), Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl))*180/Math.PI+360)%360;
}
function destinationPoint(lat, lon, distM, bearingDeg) {
  const R=6371000, d=distM/R, b=bearingDeg*Math.PI/180;
  const p1=lat*Math.PI/180, l1=lon*Math.PI/180;
  const p2=Math.asin(Math.sin(p1)*Math.cos(d)+Math.cos(p1)*Math.sin(d)*Math.cos(b));
  const l2=l1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(p1), Math.cos(d)-Math.sin(p1)*Math.sin(p2));
  return { lat: p2*180/Math.PI, lon: ((l2*180/Math.PI)+540)%360-180 };
}
function bearingInArc(b, start, end) {
  let span = end - start; if (span < 0) span += 360; if (span === 0) return true;
  return ((b - start + 360) % 360) <= span;
}
function isOutsideBound() {
  if (!S.anchorSet || S.distance === null) return false;
  if (S.mode === 'advanced') {
    return !(S.distance >= S.small && S.distance <= S.big && bearingInArc(S.bearing, S.startAngle, S.endAngle));
  }
  return S.distance > S.radius;
}
function geoSectorPoints(ancLat, ancLon, rSmall, rBig, startAngle, endAngle) {
  let span = endAngle - startAngle; if (span < 0) span += 360; if (span === 0) span = 360;
  const steps = 32, outer = [], inner = [];
  for (let i = 0; i <= steps; i++) {
    const a = startAngle + span * i / steps;
    outer.push(destinationPoint(ancLat, ancLon, rBig,   a));
    inner.push(destinationPoint(ancLat, ancLon, rSmall, a));
  }
  return [...outer, ...inner.reverse()].map(p => [p.lat, p.lon]);
}

// ─── Utilities ────────────────────────────────────────────────────────────
function fmtLatLon(lat, lon) {
  if (lat === null || lon === null) return '—';
  return lat.toFixed(5) + '\n' + lon.toFixed(5);
}
function fmtAge(ts) {
  if (!ts) return '—';
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return s + 's ago';
  return Math.round(s/60) + 'm ago';
}
function showToast(msg) {
  const el = document.getElementById('proxy-err');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 5000);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Proxy / SK API ───────────────────────────────────────────────────────
async function proxyPost(endpoint, body) {
  const r = await fetch(PROXY_BASE + endpoint, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const d = await r.json().catch(() => ({}));
  if (!r.ok || d.ok === false) throw new Error(d.error || 'HTTP ' + r.status);
  return d;
}

async function loadSkAnchorState() {
  const r = await fetch(ANCHOR_URL);
  if (!r.ok) return null;
  return r.json();
}

async function loadProxyConfig() {
  try {
    const r = await fetch(PROXY_BASE + '/api/anchor/config');
    if (!r.ok) return null;
    const d = await r.json();
    return d.config || null;
  } catch (e) { return null; }
}

async function saveProxyConfig() {
  const cfg = {
    mode: S.mode, radius: S.radius,
    small: S.small, big: S.big, startAngle: S.startAngle, endAngle: S.endAngle,
    history: S.history,
    pushover: {
      userKey: S.pushover.userKey, apiToken: S.pushover.apiToken, events: S.pushover.events,
    },
  };
  await proxyPost('/api/anchor/config', cfg);
}

// ─── Page load: fetch all state from server ───────────────────────────────
async function initialLoad() {
  // Parallel: SK anchor state + proxy config
  const [skData, proxyCfg] = await Promise.all([
    loadSkAnchorState().catch(() => null),
    loadProxyConfig(),
  ]);

  // Apply proxy config (mode, zone params, history, pushover)
  if (proxyCfg) {
    if (proxyCfg.mode) S.mode = proxyCfg.mode;
    if (typeof proxyCfg.radius === 'number')     S.radius     = proxyCfg.radius;
    if (typeof proxyCfg.small === 'number')       S.small      = proxyCfg.small;
    if (typeof proxyCfg.big === 'number')         S.big        = proxyCfg.big;
    if (typeof proxyCfg.startAngle === 'number')  S.startAngle = proxyCfg.startAngle;
    if (typeof proxyCfg.endAngle === 'number')    S.endAngle   = proxyCfg.endAngle;
    if (Array.isArray(proxyCfg.history))          S.history    = proxyCfg.history;
    if (proxyCfg.pushover) {
      if (proxyCfg.pushover.userKey)  S.pushover.userKey  = proxyCfg.pushover.userKey;
      if (proxyCfg.pushover.apiToken) S.pushover.apiToken = proxyCfg.pushover.apiToken;
      if (proxyCfg.pushover.events) {
        Object.assign(S.pushover.events, proxyCfg.pushover.events);
      }
    }
  }

  // Apply SK anchor state (position + maxRadius — SK is authoritative for these)
  if (skData) {
    const pos = skData.position && skData.position.value;
    if (pos && pos.latitude != null && pos.longitude != null) {
      S.anchorSet = true;
      S.anchorLat = pos.latitude;
      S.anchorLon = pos.longitude;
    }
    // maxRadius from SK overrides proxy config (SK is source of truth for radius)
    const maxR = skData.maxRadius && skData.maxRadius.value;
    if (typeof maxR === 'number' && maxR > 0) {
      S.radius = maxR;
      if (S.mode === 'advanced') S.big = maxR;
    }
  }
}

// ─── Pushover ─────────────────────────────────────────────────────────────
function sendPushover(eventKey) {
  if ((eventKey === 'dragging' || eventKey === 'gpsLost') && (!S.anchorSet || S.alarmSuppressed)) return;
  const cfg = S.pushover;
  if (!cfg.userKey || !cfg.apiToken) return;
  const ev = cfg.events[eventKey];
  if (!ev || !ev.enabled) return;
  const now = Date.now();
  if (S.lastPushover[eventKey] && now - S.lastPushover[eventKey] < 60000) return;
  S.lastPushover[eventKey] = now;
  const params = new URLSearchParams({
    token: cfg.apiToken, user: cfg.userKey, title: ev.title, message: ev.message, priority: String(ev.priority)
  });
  if (ev.priority === 2) { params.set('retry','60'); params.set('expire','3600'); }
  fetch('https://api.pushover.net/1/messages.json', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: params.toString()
  }).catch(() => {});
}

// ─── Alarm logic ──────────────────────────────────────────────────────────
let _gpsLostNotified = false;

function checkAlarms() {
  if (!S.anchorSet) return;
  if (S.lastGpsFix && Date.now() - S.lastGpsFix > 30000) {
    if (!_gpsLostNotified) { _gpsLostNotified = true; sendPushover('gpsLost'); showAlarmOverlay('gps'); }
    S.lastAlarmState = 'gps-lost'; return;
  }
  if (S.alarmSuppressed) { S.lastAlarmState = isOutsideBound() ? 'dragging' : 'ok'; return; }
  if (isOutsideBound()) {
    if (S.lastAlarmState !== 'dragging') { sendPushover('dragging'); }
    S.lastAlarmState = 'dragging';
    if (!S.alarmAcknowledged) showAlarmOverlay('dragging');
  } else {
    if (S.lastAlarmState === 'dragging' && S.alarmAcknowledged) S.alarmAcknowledged = false;
    S.lastAlarmState = 'ok';
  }
}

function showAlarmOverlay(type) {
  const overlay = document.getElementById('alarm-overlay');
  const title   = document.getElementById('alarm-title');
  const detail  = document.getElementById('alarm-detail');
  if (type === 'dragging') {
    title.textContent  = 'ANCHOR DRAGGING';
    detail.textContent = S.distance !== null
      ? 'Distance: ' + Math.round(S.distance) + ' m (limit: ' + (S.mode==='advanced' ? S.big : S.radius) + ' m)'
      : 'Boat is outside allowed zone.';
  } else {
    title.textContent  = 'GPS SIGNAL LOST';
    detail.textContent = 'No GPS updates received in the last 30 seconds.';
  }
  overlay.classList.add('active');
}
function hideAlarmOverlay() {
  document.getElementById('alarm-overlay').classList.remove('active');
  S.alarmAcknowledged = true;
}

// ─── Poll loop ────────────────────────────────────────────────────────────
let _pollTimer = null;

async function poll() {
  try {
    // Re-sync anchor state from SK
    const skData = await loadSkAnchorState().catch(() => null);
    if (skData) {
      const pos = skData.position && skData.position.value;
      const wasSet = S.anchorSet;
      if (pos && pos.latitude != null && pos.longitude != null) {
        S.anchorSet = true; S.anchorLat = pos.latitude; S.anchorLon = pos.longitude;
        if (!wasSet) { S.watchStart = S.watchStart || Date.now(); S.trail = []; S.maxDist = 0; }
      } else {
        if (wasSet) {
          S.anchorSet = false; S.anchorLat = null; S.anchorLon = null;
          S.lastAlarmState = 'ok'; S.alarmAcknowledged = false;
          hideAlarmOverlay(); _gpsLostNotified = false;
        }
      }
    }

    // Fetch GPS/battery from SK
    const r = await fetch(SELF_URL);
    if (r.ok) {
      const data = await r.json();
      const nav = data.navigation;
      if (nav && nav.position && nav.position.value) {
        const pos = nav.position.value;
        if (pos.latitude !== undefined && pos.longitude !== undefined) {
          S.curLat = pos.latitude; S.curLon = pos.longitude;
          S.lastGpsFix = Date.now(); _gpsLostNotified = false;
        }
      }
      if (nav && nav.gnss && nav.gnss.methodQuality) {
        const hAcc = nav.gnss.methodQuality.value && nav.gnss.methodQuality.value.horizontalDilution;
        if (typeof hAcc === 'number') S.gpsAccuracy = Math.round(hAcc * 5);
      }
      const elec = data.electrical;
      if (elec && elec.batteries && elec.batteries.house) {
        const pct = elec.batteries.house.capacity && elec.batteries.house.capacity.stateOfCharge && elec.batteries.house.capacity.stateOfCharge.value;
        if (typeof pct === 'number') S.battery = Math.round(pct * 100);
      }
    }

    // Update computed values
    if (S.anchorSet && S.curLat !== null && S.anchorLat !== null) {
      S.distance = haversine(S.anchorLat, S.anchorLon, S.curLat, S.curLon);
      S.bearing  = bearingTo(S.anchorLat, S.anchorLon, S.curLat, S.curLon);
      const now = Date.now(), last = S.trail[S.trail.length - 1];
      if (!last || now - last.t > 10000) { S.trail.push({lat:S.curLat, lon:S.curLon, t:now}); if (S.trail.length > 500) S.trail.shift(); }
      if (S.distance > S.maxDist) S.maxDist = S.distance;
    }

    checkAlarms();
    if (S.alarmSuppressed && S.anchorSet) S.alarmSuppressed = false;
    updateUI();
  } catch (e) { /* network error */ }

  _pollTimer = setTimeout(poll, 1000);
}

// ─── UI update (live values, no re-render of modals) ─────────────────────
function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

function updateUI() {
  // Main screen stats
  if (S.curLat !== null) {
    const el = document.getElementById('val-cur-pos');
    if (el) { el.innerHTML = S.curLat.toFixed(5) + '<br>' + S.curLon.toFixed(5); }
  }
  setText('val-accuracy', S.gpsAccuracy !== null ? S.gpsAccuracy + ' m' : '—');
  setText('val-gps-age', fmtAge(S.lastGpsFix));
  setText('val-battery', S.battery !== null ? S.battery + ' %' : '—');

  if (S.anchorSet && S.anchorLat !== null) {
    const aEl = document.getElementById('val-anc-pos');
    if (aEl) aEl.innerHTML = S.anchorLat.toFixed(5) + '<br>' + S.anchorLon.toFixed(5);
    setText('val-distance', S.distance !== null ? Math.round(S.distance) + ' m' : '—');
    const dEl = document.getElementById('val-distance');
    if (dEl && S.distance !== null) {
      const limit = S.mode === 'advanced' ? S.big : S.radius;
      dEl.className = 'stat-value' + (S.distance > limit * 0.85 ? ' amber' : '');
    }
    setText('val-bearing', S.bearing !== null ? Math.round(S.bearing) + '°' : '—');
  } else {
    setText('val-anc-pos', '—');
    setText('val-distance', '—');
    setText('val-bearing', '—');
  }

  setText('val-allowed', S.mode === 'advanced'
    ? S.small + ' – ' + S.big + ' m'
    : S.radius + ' m');

  // Main screen buttons
  const btnA = document.getElementById('btn-set-anchor');
  if (btnA) {
    if (S.anchorSet) {
      btnA.textContent = 'Cancel Anchor';
      btnA.className = 'btn btn-outline-red';
      btnA.style.flex = '1.5';
    } else {
      btnA.textContent = 'Set Anchor';
      btnA.className = 'btn btn-blue';
      btnA.style.flex = '1.5';
    }
  }

  // Status banner
  const banner = document.getElementById('status-banner');
  if (S.anchorSet && S.lastAlarmState === 'dragging') {
    banner.textContent = '⚠ ANCHOR DRAGGING'; banner.className = 'alarm';
  } else if (S.lastAlarmState === 'gps-lost') {
    banner.textContent = 'GPS SIGNAL LOST'; banner.className = 'warning';
  } else {
    banner.className = '';
  }

  // Map updates
  updateMap();

  // History tab
  renderHistory();
}

    const btn = document.getElementById('dt-confirm');

function buildArcPreviewSVG(sv, bv, sav, eav, size) {
  const c = size/2, maxR = size/2 - 12;
  const sc = maxR / Math.max(Number(bv)||1, 1);
  const rS = (Number(sv)||0)*sc, rB = (Number(bv)||1)*sc;
  let span = Number(eav) - Number(sav); if (span < 0) span += 360; if (span === 0) span = 360;
  const toXY = (a, r) => { const rad = (a-90)*Math.PI/180; return [c+Math.cos(rad)*r, c+Math.sin(rad)*r]; };
  const steps = 32, outer = [], inner = [];
  for (let i = 0; i <= steps; i++) { const a = Number(sav)+span*i/steps; outer.push(toXY(a,rB)); inner.push(toXY(a,rS)); }
  const pts = [...outer,...inner.reverse()];
  const valid = Number(sv) < Number(bv);
  const d = 'M '+pts.map(([x,y])=>x.toFixed(1)+','+y.toFixed(1)).join(' L ')+' Z';
  return `<svg width="${size}" height="${size}">
    <circle cx="${c}" cy="${c}" r="${rB.toFixed(1)}" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity=".4"/>
    <circle cx="${c}" cy="${c}" r="${rS.toFixed(1)}" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity=".4"/>
    ${valid ? `<path d="${d}" fill="#22d3ee" fill-opacity=".25" stroke="#22d3ee" stroke-width="2"/>` : ''}
    <circle cx="${c}" cy="${c}" r="3" fill="#f87171"/>
  </svg>`;
}

async function doSetAnchor(type, relDist, relBear, customLat, customLon) {
  if (S.curLat === null && type !== 'custom') { showToast('No GPS — wait for Signal K'); return; }
  let lat, lon;
  if (type === 'current') {
    lat = S.curLat; lon = S.curLon;
  } else if (type === 'relative') {
    const pt = destinationPoint(S.curLat, S.curLon, relDist, relBear);
    lat = pt.lat; lon = pt.lon;
  } else {
    lat = customLat; lon = customLon;
  }

  closeModal();
  S.alarmSuppressed = true; S.lastAlarmState = 'ok';

  try {
    // 1. Write radius BEFORE position
    await proxyPost('/api/anchor/radius', { value: S.radius });
    // 2. Write position
    await proxyPost('/api/anchor/set', { latitude: lat, longitude: lon });
    // 3. Update local state
    S.anchorSet = true; S.anchorLat = lat; S.anchorLon = lon;
    S.watchStart = Date.now(); S.trail = []; S.maxDist = 0;
    S.alarmAcknowledged = false;
    // 4. Add to history and persist
    S.history.unshift({ lat, lon, ts: Date.now() });
    if (S.history.length > 50) S.history.pop();
    await saveProxyConfig();
    sendPushover('anchorSet');
    updateUI(); initMap();
  } catch (e) {
    S.alarmSuppressed = false;
    showToast('Set anchor failed: ' + e.message);
  }
}

// ─── Map ──────────────────────────────────────────────────────────────────
let _map = null, _anchorMark = null, _zoneLyr = null, _boatMark = null, _trail = null, _aisLyrs = [];
let _aisTick = 0, _zoneKey = null;

function makeTileLayer() {
  return L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  });
}

function initMap() {
  if (typeof L === 'undefined') return;
  const el = document.getElementById('leaflet-map');
  if (!el) return;
  if (_map) { _map.remove(); _map = null; _anchorMark = null; _zoneLyr = null; _boatMark = null; _trail = null; _aisLyrs = []; }

  const center = S.anchorLat !== null ? [S.anchorLat, S.anchorLon]
               : S.curLat !== null   ? [S.curLat, S.curLon]
               : [37.0, 25.0];
  _map = L.map(el, { zoomControl: true, scrollWheelZoom: false, attributionControl: true });
  makeTileLayer().addTo(_map);
  _map.setView(center, 15);

  if (S.anchorLat !== null) {
    _anchorMark = L.marker([S.anchorLat, S.anchorLon], {
      icon: L.divIcon({ html: '<div style="font-size:28px;filter:drop-shadow(1px 2px 3px rgba(0,0,0,.5))">⚓</div>', className: '', iconSize: [32,32], iconAnchor: [16,28] })
    }).addTo(_map);
    drawZone();
  }
  if (S.curLat !== null) {
    _boatMark = L.marker([S.curLat, S.curLon], {
      icon: L.divIcon({ html: boatIconHtml(), className: '', iconSize: [24,24], iconAnchor: [12,12] })
    }).addTo(_map);
  }
  _trail = L.polyline(S.trail.map(p=>[p.lat,p.lon]), { color:'#3b82f6', weight:2, opacity:.8 }).addTo(_map);

  // Seed trail from SK tracks plugin
  fetch(SELF_URL + '/navigation/track?limit=500').then(r=>r.ok?r.json():null).then(geo=>{
    if (!geo || !Array.isArray(geo.coordinates)) return;
    const pts = geo.coordinates.map(c=>[c[1],c[0]]);
    if (pts.length > 1 && _trail) _trail.setLatLngs(pts);
  }).catch(()=>{});

  if (_zoneLyr) { const b = _zoneLyr.getBounds ? _zoneLyr.getBounds() : null; if (b && b.isValid()) _map.fitBounds(b, {padding:[30,30]}); }
  updateAIS();
}

function boatIconHtml() {
  return `<svg width="24" height="24" viewBox="-12 -12 24 24">
    <ellipse cx="-4" cy="0" rx="2.5" ry="8" fill="white" stroke="#333" stroke-width=".5"/>
    <ellipse cx="4" cy="0" rx="2.5" ry="8" fill="white" stroke="#333" stroke-width=".5"/>
    <rect x="-3.5" y="-4" width="7" height="8" rx="1" fill="white" stroke="#333" stroke-width=".5"/>
    <circle cx="0" cy="0" r="3.5" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  </svg>`;
}

function drawZone() {
  if (!_map) return;
  const key = S.mode + ':' + S.radius + ':' + S.small + ':' + S.big + ':' + S.startAngle + ':' + S.endAngle + ':' + S.anchorLat + ':' + S.anchorLon;
  if (_zoneLyr && key === _zoneKey) return;
  if (_zoneLyr) { _map.removeLayer(_zoneLyr); _zoneLyr = null; }
  _zoneKey = key;
  if (!S.anchorLat) return;
  if (S.mode === 'advanced') {
    const pts = geoSectorPoints(S.anchorLat, S.anchorLon, S.small, S.big, S.startAngle, S.endAngle);
    _zoneLyr = L.polygon(pts, { color:'#22c55e', fillColor:'#22c55e', fillOpacity:.15, weight:2.5 }).addTo(_map);
  } else {
    _zoneLyr = L.circle([S.anchorLat, S.anchorLon], { radius: S.radius, color:'#22c55e', fillColor:'#22c55e', fillOpacity:.15, weight:2.5 }).addTo(_map);
  }
}

function updateMap() {
  if (!_map) return;
  if (S.anchorLat !== null) {
    if (!_anchorMark) {
      _anchorMark = L.marker([S.anchorLat, S.anchorLon], {
        icon: L.divIcon({ html:'<div style="font-size:28px;filter:drop-shadow(1px 2px 3px rgba(0,0,0,.5))">⚓</div>', className:'', iconSize:[32,32], iconAnchor:[16,28] })
      }).addTo(_map);
    } else {
      _anchorMark.setLatLng([S.anchorLat, S.anchorLon]);
    }
    drawZone();
  } else {
    if (_anchorMark) { _map.removeLayer(_anchorMark); _anchorMark = null; }
    if (_zoneLyr)    { _map.removeLayer(_zoneLyr); _zoneLyr = null; _zoneKey = null; }
  }
  if (S.curLat !== null) {
    if (!_boatMark) {
      _boatMark = L.marker([S.curLat, S.curLon], {
        icon: L.divIcon({ html: boatIconHtml(), className:'', iconSize:[24,24], iconAnchor:[12,12] })
      }).addTo(_map);
    } else {
      _boatMark.setLatLng([S.curLat, S.curLon]);
    }
  }
  if (_trail) _trail.setLatLngs(S.trail.map(p=>[p.lat,p.lon]));
  _aisTick++; if (_aisTick % 30 === 0) updateAIS();
}

async function updateAIS() {
  if (!_map) return;
  _aisLyrs.forEach(m => { try { _map.removeLayer(m); } catch(e){} });
  _aisLyrs = [];
  try {
    const r = await fetch(SK_BASE + '/signalk/v1/api/vessels');
    if (!r.ok) return;
    const vessels = await r.json();
    Object.entries(vessels).forEach(([id, v]) => {
      if (id === 'self') return;
      const pos = v.navigation && v.navigation.position && v.navigation.position.value;
      if (!pos || pos.latitude == null) return;
      const name = (v.name && v.name.value) || (v.mmsi && v.mmsi.value) || id.slice(-6);
      const dist = S.curLat !== null ? Math.round(haversine(S.curLat, S.curLon, pos.latitude, pos.longitude)) : null;
      const icon = L.divIcon({
        html: `<div style="color:#f59e0b;font-size:20px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">▲</div>`,
        className: '', iconSize:[20,20], iconAnchor:[10,10]
      });
      const mk = L.marker([pos.latitude, pos.longitude], { icon })
        .bindTooltip(name + (dist !== null ? ' · ' + dist + ' m' : ''), { permanent:false, direction:'right', className:'leaflet-tooltip' });
      mk.addTo(_map);
      _aisLyrs.push(mk);
    });
  } catch(e) {}
}

function invalidateMap() { if (_map) _map.invalidateSize(); }

// ─── History ──────────────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('history-list');
  if (!container) return;
  if (S.history.length === 0) {
    container.innerHTML = '<div class="history-empty">No anchor history yet</div>';
    return;
  }
  const byDay = {};
  S.history.forEach(e => {
    const d = new Date(e.ts);
    const key = d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(e);
  });
  container.innerHTML = Object.entries(byDay).map(([day, entries]) => `
    <div class="history-day-header">${esc(day)}</div>
    ${entries.map(e => `
      <div class="history-entry" data-lat="${e.lat}" data-lon="${e.lon}">
        <div class="history-pos">${e.lat.toFixed(5)} ${e.lon.toFixed(5)}</div>
        <div class="history-time">${new Date(e.ts).toLocaleString('en-US', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
      </div>`).join('')}
  `).join('');
  container.querySelectorAll('.history-entry').forEach(el => {
    el.addEventListener('click', () => {
      if (_map) {
        switchTab('tab-map');
        setTimeout(() => { _map.setView([Number(el.dataset.lat), Number(el.dataset.lon)], 15); }, 60);
      }
    });
  });
}

// ─── Settings ─────────────────────────────────────────────────────────────
function renderSettings() {
  const el = document.getElementById('tab-settings');
  if (!el) return;
  const events = S.pushover.events;
  const tokenDisplay = S.pvShowToken ? esc(S.pushover.apiToken) : (S.pushover.apiToken ? '••••••••' : '');
  const prioLabel = p => p === -1 ? 'Lowest' : p === 0 ? 'Normal' : p === 1 ? 'High' : 'Emergency';

  el.innerHTML = `
    <div style="font-size:20px;font-weight:700;padding:18px 18px 12px;flex-shrink:0">Settings</div>
    <div style="flex:1;overflow-y:auto;padding:0 18px 18px">
      <div class="settings-section">
        <div class="settings-heading">Pushover Credentials</div>
        <div class="settings-input-wrap">
          <div class="settings-input-label">User Key</div>
          <input class="settings-input" id="pv-userkey" type="text" value="${esc(S.pushover.userKey)}" autocomplete="off" placeholder="Your Pushover user key"/>
        </div>
        <div class="settings-input-wrap">
          <div class="settings-input-label">API Token <button id="pv-toggle-token" style="background:none;border:none;color:#22d3ee;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;margin-left:8px">${S.pvShowToken?'Hide':'Show'}</button></div>
          <input class="settings-input" id="pv-apitoken" type="${S.pvShowToken?'text':'password'}" value="${S.pvShowToken ? esc(S.pushover.apiToken) : (S.pushover.apiToken ? '••••••••' : '')}" autocomplete="off" placeholder="Your app API token"/>
        </div>
        <div style="font-size:10px;color:#7a9abf;line-height:1.4;margin-top:-6px">Find these at pushover.net under your dashboard and registered Application.</div>
      </div>
      <div class="settings-section">
        <div class="settings-heading">Notifications</div>
        ${Object.entries(events).map(([key, ev]) => `
          <div style="border:.5px solid #1e2a38;border-radius:8px;padding:12px;margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div>
                <div style="font-size:14px;font-weight:600">${esc(ev.title)}</div>
                <div style="font-size:11px;color:#7a9abf;margin-top:2px">${esc(ev.message)}</div>
              </div>
              <label class="toggle-sw">
                <input type="checkbox" data-pv-toggle="${key}" ${ev.enabled?'checked':''}/>
                <div class="track"></div><div class="thumb"></div>
              </label>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:11px;color:#7a9abf">Priority:</span>
              <div class="prio-btns">
                ${[-1,0,1,2].map(p=>`<button class="prio-btn${ev.priority===p?' active':''}" data-pv-prio="${key}" data-prio="${p}">${prioLabel(p)}</button>`).join('')}
              </div>
            </div>
          </div>`).join('')}
      </div>
      <div class="settings-section">
        <button id="pv-test" class="btn btn-outline-cyan btn-full" style="margin-bottom:10px">Send Test Notification</button>
        <button id="pv-save" class="btn btn-blue btn-full">Save Settings</button>
      </div>
    </div>`;

  el.querySelector('#pv-toggle-token')?.addEventListener('click', () => { S.pvShowToken = !S.pvShowToken; renderSettings(); });
  el.querySelector('#pv-save')?.addEventListener('click', async () => {
    const uk = document.getElementById('pv-userkey')?.value.trim() || '';
    const at = document.getElementById('pv-apitoken')?.value.trim() || '';
    if (uk) S.pushover.userKey  = uk;
    if (at && !at.startsWith('•')) S.pushover.apiToken = at;
    try { await saveProxyConfig(); showToast('Settings saved'); setTimeout(()=>{ const e=document.getElementById('proxy-err'); if(e) e.style.display='none'; }, 1500); }
    catch(e) { showToast('Save failed: ' + e.message); }
  });
  el.querySelector('#pv-test')?.addEventListener('click', () => {
    const cfg = S.pushover;
    if (!cfg.userKey || !cfg.apiToken) { showToast('Set Pushover credentials first'); return; }
    const params = new URLSearchParams({ token: cfg.apiToken, user: cfg.userKey, title: 'Anchor Watch Test', message: 'Test notification from S/V Oroboro.', priority: '0' });
    fetch('https://api.pushover.net/1/messages.json', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: params.toString() }).catch(()=>{});
  });
  el.querySelectorAll('[data-pv-toggle]').forEach(cb => {
    cb.addEventListener('change', () => { const k = cb.dataset.pvToggle; if (S.pushover.events[k]) S.pushover.events[k].enabled = cb.checked; });
  });
  el.querySelectorAll('[data-pv-prio]').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.pvPrio, p = Number(btn.dataset.prio);
      if (S.pushover.events[k]) { S.pushover.events[k].priority = p; renderSettings(); }
    });
  });
}

// ─── Startup ──────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    await initialLoad();
  } catch(e) {
    // Proceed with defaults if server is unreachable
  }

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';

  renderHistory();
  renderSettings();
  updateUI();

  // Init map if we're on the map tab (rare on load, but handle it)
  if (S.activeTab === 'tab-map' || S.anchorSet) {
    setTimeout(initMap, 100);
  }

  _pollTimer = setTimeout(poll, 500);
});
</script>
</body>
